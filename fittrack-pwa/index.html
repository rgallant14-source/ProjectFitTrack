<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>FitTrack</title>
<meta name="description" content="Strength, agility, and skills tracking for teen athletes." />
<meta name="theme-color" content="#0F1119" />

<!-- PWA install metadata -->
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="FitTrack" />

<link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <div id="app" class="app-shell" role="main"></div>

  <!-- Bottom tab bar, hidden on auth screens via body[data-authed] -->
  <nav id="tab-bar" class="tab-bar" aria-label="Primary">
    <button class="tab-btn" data-route="dashboard" aria-label="Dashboard">
      <svg viewBox="0 0 24 24" class="tab-icon"><path d="M4 11.5 12 4l8 7.5V20a1 1 0 0 1-1 1h-4.5v-6h-5v6H5a1 1 0 0 1-1-1Z" fill="currentColor"/></svg>
      <span>Dashboard</span>
    </button>
    <button class="tab-btn" data-route="calendar" aria-label="Calendar">
      <svg viewBox="0 0 24 24" class="tab-icon"><rect x="3" y="5" width="18" height="16" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M3 9h18M8 3v4M16 3v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span>Calendar</span>
    </button>
    <button class="tab-btn" data-route="clips" aria-label="Clips">
      <svg viewBox="0 0 24 24" class="tab-icon"><rect x="3" y="4" width="18" height="16" rx="3" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M10 9l5 3-5 3V9z" fill="currentColor"/></svg>
      <span>Clips</span>
    </button>
    <button class="tab-btn" data-route="team" aria-label="Team" id="tab-team">
      <svg viewBox="0 0 24 24" class="tab-icon"><circle cx="8" cy="8" r="3" fill="none" stroke="currentColor" stroke-width="1.8"/><circle cx="17" cy="9" r="2.4" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M2.5 20c1.2-3.6 3.5-5.4 5.5-5.4s4.3 1.8 5.5 5.4M13.5 20c.8-2.6 2.3-4 3.9-4.4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span>Team</span>
    </button>
    <button class="tab-btn" data-route="messages" aria-label="Messages">
      <svg viewBox="0 0 24 24" class="tab-icon"><rect x="3" y="5" width="18" height="14" rx="2.5" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M4 7l8 6 8-6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Messages</span>
    </button>
    <button class="tab-btn" data-route="profile" aria-label="Profile">
      <svg viewBox="0 0 24 24" class="tab-icon"><circle cx="12" cy="8" r="3.6" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M4.5 20c1.6-3.6 4.6-5.4 7.5-5.4s5.9 1.8 7.5 5.4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span>Profile</span>
    </button>
  </nav>

  <div id="toast" class="toast" aria-live="polite"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
